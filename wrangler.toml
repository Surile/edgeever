name = "edgeever"
main = "apps/api/src/index.ts"
compatibility_date = "2026-06-26"
workers_dev = true

[assets]
directory = "apps/web/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*", "/mcp"]

[[d1_databases]]
binding = "DB"
database_name = "edgeever"
database_id = "61bdc745-30ff-48e0-9a31-8babb8224f5d"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "RESOURCES"
bucket_name = "edgeever-resources"
preview_bucket_name = "edgeever-resources"

[observability]
enabled = true

[[vectorize]]
binding = "MEMO_VECTORS"
index_name = "edgeever-memo-vectors"

[ai]
binding = "AI"

[vars]
EDGE_EVER_SEMANTIC_SEARCH_ENABLED = "true"

[triggers]
crons = ["*/5 * * * *"]
